name: 自动打包并部署到 VPS

# 触发条件：当代码推送到 main 分支时自动运行
on:
  push:
    branches:
      - main
      # 如果你的默认分支叫 master，请把上面的 main 改成 master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 借用 GitHub 官方提供的超级服务器（7GB内存，绝对不崩）

    steps:
      # 1. 把你的最新代码拉取到 GitHub 的服务器上
      - name: ⬇️ 获取代码
        uses: actions/checkout@v4

      # 2. 安装 Node.js 运行环境
      - name: ⚙️ 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 安装依赖并执行打包（生成 dist 文件夹）
      - name: 📦 安装依赖 & Astro 打包
        run: |
          npm install
          npm run build

      # 4. 将打包好的 dist 目录传输到你的 RackNerd VPS
      - name: 🚀 部署上线到 VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "dist/*"
          target: "/var/www/ricoui-portfolio-zh/dist"
          strip_components: 1 # 自动脱掉外层的 dist 目录壳子，把内容精准放进网站根目录